services:
  # Rust backend (ct-bot serve: in-process ONNX inference + MCTS, same API as
  # the old FastAPI backend). MCTS_SIMS tunes strength/latency per move.
  backend:
    build:
      context: .
      dockerfile: rust/ct-bot/Dockerfile
    container_name: chesstransformer-backend
    ports:
      - "5001:5001"
    environment:
      - MCTS_SIMS=800
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5001/api/health"]
      interval: 5s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Use localhost for browser-side API calls
        - NEXT_PUBLIC_API_URL=http://localhost:5001
    container_name: chesstransformer-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: chesstransformer-network
